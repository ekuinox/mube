# RP2040 は Cortex-M0+ = thumbv6m-none-eabi。
# runner は probe-rs（デバッグプローブ経由）。プローブが無ければ BOOTSEL + UF2 を使う（README 参照）。
[target.thumbv6m-none-eabi]
runner = "probe-rs run --chip RP2040"

[build]
target = "thumbv6m-none-eabi"

[env]
# defmt のログレベル。trace/debug/info/warn/error。
DEFMT_LOG = "debug"

# host-test は .cargo/config.toml の alias ではなく、flake.nix の devShell が提供する
# 外部サブコマンド cargo-host-test で実装している。uname -m でホストトリプルを動的に
# 解決するため、x86_64 / aarch64 どちらの環境でも `cargo host-test` がそのまま動く。
