name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi
          components: clippy

      - name: Create dummy CYW43 firmware blobs
        run: |
          mkdir -p crates/firmware/cyw43-firmware
          touch crates/firmware/cyw43-firmware/43439A0.bin
          touch crates/firmware/cyw43-firmware/43439A0_clm.bin
          touch crates/firmware/cyw43-firmware/nvram_rp2040.bin

      # firmware は build.rs で crates/webui/dist/ の存在を要求し include_bytes! で埋め込む。
      # dist は trunk build の派生物（非コミット）。型検査（cargo check/clippy）だけなら
      # 空ファイルで include_bytes! が通るため、実 WebUI をビルドせずダミーを置く
      # （CYW43 ブロブと同じ扱い。実アセットはローカルの `trunk build --release` で生成）。
      - name: Create dummy WebUI dist
        run: |
          mkdir -p crates/webui/dist
          touch crates/webui/dist/index.html
          touch crates/webui/dist/webui.js
          touch crates/webui/dist/webui_bg.wasm

      - name: cargo check (mube-core)
        run: cargo check -p mube-core --locked --target x86_64-unknown-linux-gnu

      - name: cargo check (mube-firmware)
        run: cargo check -p mube-firmware --locked --target thumbv6m-none-eabi

      - name: cargo clippy (mube-core)
        run: cargo clippy -p mube-core --locked --target x86_64-unknown-linux-gnu -- -D warnings

      - name: cargo clippy (mube-firmware)
        run: cargo clippy -p mube-firmware --locked --target thumbv6m-none-eabi -- -D warnings

      - name: cargo test (mube-core)
        run: cargo test -p mube-core --locked --target x86_64-unknown-linux-gnu

  circuit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # circuit/ の bun/tscircuit ツールチェーンは flake の devShell から得る（ローカルと同一）。
      - uses: DeterminateSystems/nix-installer-action@main

      - name: bun test (circuit — 回路図ERC + ブレッドボード自動place&route)
        run: |
          nix develop --command bash -euo pipefail -c '
            cd circuit
            bun install --frozen-lockfile
            bun test
          '

  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ローカルと同じ openscad-unstable（Manifold バックエンド）と headless EGL 環境を
      # flake の devShell から得るため Nix を使う。apt の安定版 openscad には Manifold
      # バックエンドが無く、レンダリング挙動が一致しない。
      - uses: DeterminateSystems/nix-installer-action@main

      - name: bun test (scad ヘルパ + lockctl)
        run: nix develop --command bun test scad/ lockctl.test.ts

      - name: Render SCAD models to STL (fails on WARNING/ERROR)
        run: |
          nix develop --command bash -euo pipefail -c '
            # clash_check.scad は「空出力が正解」の干渉検査フィクスチャなので
            # *_test.scad グロブに含まれず、次の専用ステップで判定する
            for f in scad/smartlock.scad scad/smoke.scad scad/*_test.scad; do
              echo "::group::render $f"
              bun scad/render.ts "$f"
              echo "::endgroup::"
            done
          '

      - name: Part clash check (組立位置での部品間体積干渉が無いこと)
        run: nix develop --command bun scad/clash.ts
